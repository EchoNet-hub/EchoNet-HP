<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="description"
        content="Hibiki Nishitani's homepage. Research on cetacean societies, animal behaviour, cetacean biology and social network analysis."
    >

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="alternate"
        hreflang="ja"
        href="https://echonet-hub.github.io/EchoNet-HP/"
    >

    <link
        rel="alternate"
        hreflang="en"
        href="https://echonet-hub.github.io/EchoNet-HP/English/"
    >

    <link rel="stylesheet" href="style_my.css">

    <title>Hibiki Nishitani's Homepage</title>
</head>

<body>

    <main class="site-shell">

        <div class="language-switch" aria-label="Language selection">

            <a
                class="language-link"
                href="../"
                lang="ja"
            >
                日本語
            </a>

            <span class="language-divider" aria-hidden="true">｜</span>

            <a
                class="language-link current-language"
                href="./"
                lang="en"
                aria-current="page"
            >
                English
            </a>

        </div>

        <header class="site-header">

            <h1 class="site-title">
                <a href="./">
                    Hibiki Nishitani’s Homepage
                </a>
            </h1>

        </header>

        <nav class="main-nav" aria-label="Main navigation">

            <div class="nav-item">
                <a class="nav-link" href="../About/">
                    About
                </a>
            </div>

            <div class="nav-item">
                <span class="nav-text">
                    Research
                </span>
            </div>

            <div class="nav-item">
                <span class="nav-text">
                    Works
                </span>
            </div>

            <div class="nav-item">
                <span class="nav-text">
                    Sources
                </span>
            </div>

            <div class="nav-item">
                <a class="nav-link" href="../Links/">
                    Links
                </a>
            </div>

        </nav>

        <img
            class="main-image"
            src="../dolphin_img.jpg"
            alt="A dolphin swimming underwater"
        >

        <section class="news-section" aria-labelledby="news-title">

            <h2 class="news-title" id="news-title">
                News
            </h2>

            <div class="news-list">

                <p class="news-item">
                    15 July 2026 — Add news here.
                </p>

                <p class="news-item">
                    1 July 2026 — Add news here.
                </p>

                <p class="news-item">
                    15 June 2026 — Add news here.
                </p>

                <p class="news-item">
                    1 June 2026 — Add news here.
                </p>

                <p class="news-item">
                    15 May 2026 — Add news here.
                </p>

            </div>

        </section>

        <footer class="site-footer">

            <p class="copyright">
                copyright (c) 2024 Nishitani Hibiki
            </p>

            <a class="contact-link" href="../Contact/">
                Contact
            </a>

        </footer>

    </main>

</body>

</html>
