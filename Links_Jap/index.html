<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="西谷響の外部リンク">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_links.css">
    <title>リンク・Links | 西谷響</title>
</head>

<body>

    <header class="global-header">
        <div class="global-header-inner">

            <a class="site-title" href="../">
                西谷響のホームページ・
                <span lang="en">Hibiki Nishitani’s HP</span>
            </a>

            <nav class="main-nav" aria-label="メインメニュー">

                <div class="nav-item">
                    <a
                        class="nav-ja nav-link"
                        href="../About_Jap/"
                    >
                        略歴
                    </a>

                    <a
                        class="nav-en nav-link"
                        href="../About/"
                        lang="en"
                    >
                        About
                    </a>
                </div>

                <div class="nav-item">
                    <span class="nav-ja nav-text">研究</span>
                    <span class="nav-en nav-text" lang="en">
                        Research
                    </span>
                </div>

                <div class="nav-item">
                    <span class="nav-ja nav-text">業績</span>
                    <span class="nav-en nav-text" lang="en">
                        Works
                    </span>
                </div>

                <div class="nav-item">
                    <span class="nav-ja nav-text">資料</span>
                    <span class="nav-en nav-text" lang="en">
                        Sources
                    </span>
                </div>

                <div class="nav-item">
                    <a
                        class="nav-ja nav-link current-page"
                        href="./"
                        aria-current="page"
                    >
                        リンク
                    </a>

                    <a
                        class="nav-en nav-link current-page"
                        href="./"
                        lang="en"
                        aria-current="page"
                    >
                        Links
                    </a>
                </div>

            </nav>

        </div>
    </header>

    <main class="links-page">

        <section class="hero">

            <img
                class="hero-image"
                src="IMG_1903_trim.JPG"
                alt=""
            >

            <div class="hero-overlay">
                <h1 class="hero-title">
                    <span>リンク</span>
                </h1>
            </div>

        </section>

        <section class="links-list" aria-label="外部リンク">

            <a
                class="link-item"
                href="https://github.com/EchoNet-hub"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHubを開く"
            >
                <div class="logo-box">
                    <img
                        class="link-logo"
                        src="GitHub_Invertocat_White.png"
                        alt="GitHub"
                    >
                </div>

                <span class="link-name">GitHub</span>
            </a>

            <a
                class="link-item"
                href="https://x.com/nhwin11"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Xを開く"
            >
                <div class="logo-box">
                    <img
                        class="link-logo"
                        src="logo-white.png"
                        alt="X"
                    >
                </div>

                <span class="link-name">X</span>
            </a>

            <a
                class="link-item"
                href="https://researchmap.jp/nishitani_hibiki"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Researchmapを開く"
            >
                <div class="logo-box">
                    <img
                        class="researchmap-logo"
                        src="https://researchmap.jp/outline/img/researchmap130.gif"
                        alt="Researchmap"
                    >
                </div>

                <span class="link-name">Researchmap</span>
            </a>

        </section>

    </main>

</body>

</html>
