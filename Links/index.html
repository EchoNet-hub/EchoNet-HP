<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="西谷響の外部リンク">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_links.css">
    <title>リンク・Links | 西谷響</title>
</head>

<body>
    <main class="links-page">

        <section class="hero">
            <img
                class="hero-image"
                src="IMG_1903_trim.JPG"
                alt=""
            >

            <div class="hero-overlay">
                <h1 class="hero-title">
                    <span>リンク</span>
                    <span lang="en">Links</span>
                </h1>

            </div>
        </section>

        <section class="links-list" aria-label="外部リンク">

            <a
                class="link-item"
                href="https://github.com/EchoNet-hub"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHubを開く"
            >
                <div class="logo-box">
                    <img
                        class="link-logo"
                        src="GitHub_Invertocat_White.png"
                        alt="GitHub"
                    >
                </div>

                <span class="link-name">GitHub</span>
            </a>

            <a
                class="link-item"
                href="https://x.com/nhwin11"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Xを開く"
            >
                <div class="logo-box">
                    <img
                        class="link-logo"
                        src="logo-white.png"
                        alt="X"
                    >
                </div>

                <span class="link-name">X</span>
            </a>

            <a
                class="link-item"
                href="https://researchmap.jp/nishitani_hibiki"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Researchmapを開く"
            >
                <div class="logo-box">
                    <img
                        class="researchmap-logo"
                        src="https://researchmap.jp/outline/img/researchmap130.gif"
                        alt="Researchmap"
                    >
                </div>

                <span class="link-name">Researchmap</span>
            </a>

        </section>

    </main>
</body>
</html>
